<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zimash Pharmacy | Live Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --zimash-blue: #0b4d7a;
            --zimash-green-top: #a3d95d;
            --zimash-green-bottom: #479e35;
        }
        body { background-color: #f8fafc; }
        .text-zimash-blue { color: var(--zimash-blue); }
        .bg-zimash-blue { background-color: var(--zimash-blue); }
        .cross-gradient { fill: url(#logoGradient); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .status-online { animation: pulse-green 2s infinite; }
        
        img{
             width: 70px;
             max-width: 100%;
             height: auto;
             border-radius: 20%;
             margin: 10px;
         }
         
    </style>
</head>
<body class="font-sans text-slate-800">

    <header class="bg-white border-b border-slate-200 py-6 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center">
              
                <a href="https://hsteducation.online"><img src="img.png" alt="Icon"></a>
                
                <div>
                    <h1 class="text-xl font-bold tracking-tighter text-zimash-blue uppercase leading-none">Zimash Pharmacy</h1>
                    <p class="text-[7px] font-bold tracking-[0.3em] text-zimash-blue opacity-70 leading-none mt-1 uppercase">NO 2, IDI OBI, OFF IDO-ERUWA ROAD, IDO, IBADAN, OYO STATE,NIGERIA</p>
                </div>
            </div>
            <div id="status-indicator" class="flex items-center text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                <div class="w-2.5 h-2.5 rounded-full bg-slate-300 mr-2"></div>
                Initializing...
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <div class="space-y-6 mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="relative flex-grow">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="Search your inventory..." 
                        class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-zimash-blue/10 bg-white shadow-sm transition-all">
                </div>
                <button onclick="fetchData()" class="px-5 py-3 bg-zimash-blue text-white rounded-xl font-bold shadow-md hover:bg-opacity-90 active:scale-95 transition-all flex items-center justify-center">
                    <i class="fas fa-sync-alt mr-2"></i> Refresh
                </button>
            </div>

            <div id="categoryContainer" class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <!-- Categories will be generated here -->
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 text-[10px] font-bold uppercase tracking-widest border-b border-slate-100">
                            <th class="px-6 py-4">Product Name</th>
                            <th class="px-6 py-4">Category</th>
                            <th class="px-6 py-4 text-center">Status</th>
                            <th class="px-6 py-4 text-center">Qty</th>
                            <th class="px-6 py-4 text-right">Price</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody" class="divide-y divide-slate-50">
                        <!-- Content loaded via fetchData -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Your live CSV link
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQsxXgb6NlSa5ukkO-XQUpuUmD4FvoFehIHs3oLtl9vLzHBddz9I7wATa4c9pDv8OkFQtGq2Idk4CMG/pub?output=csv";
        
        let inventoryData = [];
        let activeCategory = 'All';

        async function fetchData() {
            const status = document.getElementById('status-indicator');
            status.innerHTML = `<div class="w-2.5 h-2.5 rounded-full bg-blue-400 mr-2 animate-pulse"></div> Fetching...`;

            try {
                const response = await fetch(SHEET_CSV_URL);
                if (!response.ok) throw new Error('Data source unreachable');
                
                const rawData = await response.text();
                const rows = rawData.split(/\r?\n/).slice(1);
                
                inventoryData = rows.map(row => {
                    // Smart CSV split: handles commas inside quotes
                    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];
                    const clean = (val) => val ? val.replace(/"/g, '').trim() : '';

                    return {
                        name: clean(cols[0]),
                        price: parseFloat(clean(cols[1])) || 0,
                        qty: parseInt(clean(cols[2])) || 0,
                        category: clean(cols[3]) || 'Other'
                    };
                }).filter(item => item.name);

                updateCategories();
                applyFilters();
                
                status.innerHTML = `<div class="w-2.5 h-2.5 rounded-full bg-green-500 mr-2 status-online"></div> Live Sync Active`;
            } catch (err) {
                console.error("Sync Error:", err);
                status.innerHTML = `<div class="w-2.5 h-2.5 rounded-full bg-red-500 mr-2"></div> Connection Failed`;
                document.getElementById('inventoryBody').innerHTML = `
                    <tr><td colspan="5" class="p-16 text-center">
                        <i class="fas fa-wifi text-slate-200 text-5xl mb-4 block"></i>
                        <p class="text-slate-500 font-medium">Unable to connect to your Google Sheet.</p>
                        <p class="text-slate-400 text-xs">Verify your link and try again.</p>
                    </td></tr>`;
            }
        }

        function updateCategories() {
            const categories = ['All', ...new Set(inventoryData.map(item => item.category))];
            const container = document.getElementById('categoryContainer');
            container.innerHTML = categories.map(cat => `
                <button onclick="setCategory('${cat}')" 
                    class="px-4 py-2 rounded-lg border border-slate-200 text-xs font-bold whitespace-nowrap transition-all
                    ${activeCategory === cat ? 'bg-zimash-blue text-white border-zimash-blue shadow-sm' : 'bg-white text-slate-500 hover:bg-slate-50'}">
                    ${cat}
                </button>
            `).join('');
        }

        function setCategory(cat) {
            activeCategory = cat;
            updateCategories();
            applyFilters();
        }

        function getStatusBadge(qty) {
            if (qty <= 0) return `<span class="px-2 py-0.5 bg-red-100 text-red-700 rounded text-[9px] font-black uppercase">Out</span>`;
            if (qty < 10) return `<span class="px-2 py-0.5 bg-amber-100 text-amber-700 rounded text-[9px] font-black uppercase">Low</span>`;
            return `<span class="px-2 py-0.5 bg-green-100 text-green-700 rounded text-[9px] font-black uppercase">Stock</span>`;
        }

        function applyFilters() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = inventoryData.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(query);
                const matchesCategory = activeCategory === 'All' || item.category === activeCategory;
                return matchesSearch && matchesCategory;
            });
            renderTable(filtered);
        }

        function renderTable(data) {
            const container = document.getElementById('inventoryBody');
            if (data.length === 0) {
                container.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-slate-400">No items match your search.</td></tr>`;
                return;
            }
            container.innerHTML = data.map(item => `
                <tr class="hover:bg-slate-50/80 transition-colors">
                    <td class="px-6 py-4 font-bold text-slate-700">${item.name}</td>
                    <td class="px-6 py-4 text-[11px] font-bold text-slate-400 tracking-wide">${item.category.toUpperCase()}</td>
                    <td class="px-6 py-4 text-center">${getStatusBadge(item.qty)}</td>
                    <td class="px-6 py-4 text-center text-sm font-medium ${item.qty < 10 ? 'text-amber-600' : 'text-slate-500'}">${item.qty}</td>
                    <td class="px-6 py-4 text-right font-black text-zimash-blue tracking-tight">₦${item.price.toFixed(2)}</td>
                </tr>
            `).join('');
        }

        window.onload = fetchData;
    </script>
           <div class="mt-12 grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="p-6 rounded-2xl bg-zimash-blue text-white">
                <h4 class="font-bold mb-2"><i class="fas fa-store-alt mr-2"></i> Store Location</h4>
                <p class="text-sm opacity-80">Wellness Plaza, Suite 10, Downtown Medical District.</p>
                
        <footer class="py-12 text-center">
        <p class="text-xs text-slate-300 font-medium tracking-widest uppercase">Zimash Pharmacy © 2026</p>
    </footer>
</body>
</html>
